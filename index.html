<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD Tax Sale Overbid Lead Finder</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.app-layout{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid #334155;background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%)}
.sidebar-header h2{font-size:1.05rem;color:#f8fafc;display:flex;align-items:center;gap:8px}
.sidebar-header .app-subtitle{color:#64748b;font-size:0.7rem;margin-top:4px}
.sidebar-total{padding:10px 16px;border-bottom:1px solid #334155;background:#0f172a50;font-size:0.75rem;color:#94a3b8}
.sidebar-total strong{color:#3b82f6}
.county-list{overflow-y:auto;flex:1}
.county-item{padding:9px 14px;cursor:pointer;border-bottom:1px solid #1e293b40;display:flex;justify-content:space-between;align-items:center;transition:all 0.15s;border-left:3px solid transparent;font-size:0.82rem}
.county-item:hover{background:#334155}
.county-item.active{background:#3b82f615;border-left-color:#3b82f6}
.county-item .county-name{color:#e2e8f0;font-weight:500}
.county-item .county-badge{font-size:0.65rem;padding:2px 7px;border-radius:10px;font-weight:600}
.badge-loaded{background:#10b98120;color:#10b981}
.badge-surplus{background:#f59e0b20;color:#f59e0b}
.badge-nodata{background:#64748b20;color:#64748b}
.main-content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);border-bottom:1px solid #334155;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.3rem;color:#f8fafc}
.header .subtitle{color:#94a3b8;font-size:0.8rem}
.controls{display:flex;flex-wrap:wrap;gap:10px;padding:10px 24px;background:#1e293b;border-bottom:1px solid #334155;align-items:center}
.controls select,.controls input[type=number],.controls input[type=text]{background:#0f172a;border:1px solid #475569;color:#e2e8f0;padding:7px 11px;border-radius:6px;font-size:0.82rem}
.controls select:focus,.controls input:focus{outline:none;border-color:#3b82f6}
.controls label{color:#94a3b8;font-size:0.78rem;margin-right:4px}
.status-bar{display:flex;flex-wrap:wrap;gap:12px;padding:8px 24px;background:#1e293b40;border-bottom:1px solid #334155;align-items:center;font-size:0.78rem}
.status-pill{padding:4px 10px;border-radius:12px;font-weight:600;font-size:0.72rem}
.pill-loading{background:#f59e0b20;color:#f59e0b;animation:pulse 1.5s infinite}
.pill-done{background:#10b98120;color:#10b981}
.pill-info{background:#3b82f620;color:#60a5fa}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.progress-bar{flex:1;min-width:200px;height:6px;background:#334155;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#10b981);transition:width 0.3s;border-radius:3px}
.stats-row{display:flex;flex-wrap:wrap;gap:10px;padding:12px 24px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 16px;flex:1;min-width:130px}
.stat-card .label{color:#94a3b8;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.05em}
.stat-card .value{font-size:1.3rem;font-weight:700;color:#f8fafc;margin-top:2px}
.stat-card .sub{color:#64748b;font-size:0.72rem;margin-top:2px}
.table-wrap{overflow-x:auto;padding:0 12px;flex:1}
table{width:100%;border-collapse:collapse;font-size:0.8rem}
th{background:#1e293b;color:#94a3b8;padding:9px 10px;text-align:left;border-bottom:2px solid #334155;font-weight:600;text-transform:uppercase;font-size:0.68rem;letter-spacing:0.05em;cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;z-index:50}
th:hover{color:#e2e8f0}
th.sorted-asc::after{content:" \25B2";color:#3b82f6}
th.sorted-desc::after{content:" \25BC";color:#3b82f6}
td{padding:7px 10px;border-bottom:1px solid #1e293b;vertical-align:middle}
tr{background:#0f172a}
tr:hover{background:#1e293b}
tr.hot{border-left:3px solid #ef4444}
tr.warm{border-left:3px solid #f59e0b}
tr.cool{border-left:3px solid #3b82f6}
.ratio-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-weight:700;font-size:0.78rem}
.ratio-hot{background:#ef444420;color:#f87171}
.ratio-warm{background:#f59e0b20;color:#fbbf24}
.ratio-cool{background:#3b82f620;color:#60a5fa}
.ratio-pending{background:#64748b10;color:#64748b;font-style:italic;font-weight:400}
.addr-text{color:#94a3b8;font-size:0.72rem;margin-top:2px}
.action-btn{padding:3px 7px;border-radius:4px;border:1px solid #475569;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:0.72rem;white-space:nowrap;transition:all 0.15s}
.action-btn:hover{background:#334155;border-color:#60a5fa}
.btn-row{display:flex;gap:4px;flex-wrap:wrap}
.yr-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:0.68rem;font-weight:600}
.yr-2021{background:#6366f120;color:#818cf8}
.yr-2022{background:#8b5cf620;color:#a78bfa}
.yr-2023{background:#ec489920;color:#f472b6}
.yr-2024{background:#f59e0b20;color:#fbbf24}
.yr-2025{background:#06b6d420;color:#22d3ee}
.yr-2026{background:#10b98120;color:#34d399}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal{background:#1e293b;border:1px solid #475569;border-radius:12px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px}
.modal h2{color:#f8fafc;margin-bottom:16px;font-size:1.05rem}
.modal .close-btn{float:right;background:none;border:none;color:#94a3b8;font-size:1.3rem;cursor:pointer}
.modal .close-btn:hover{color:#f8fafc}
.prop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.prop-item{background:#0f172a;padding:10px;border-radius:6px}
.prop-item .plabel{color:#64748b;font-size:0.68rem;text-transform:uppercase}
.prop-item .pvalue{color:#f8fafc;font-size:0.92rem;font-weight:600;margin-top:2px}
.prop-item.full-width{grid-column:1/-1}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #475569;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.no-results{text-align:center;padding:40px;color:#64748b}
.no-data-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:32px;margin:24px;max-width:600px}
.no-data-card h3{color:#f8fafc;font-size:1.1rem;margin-bottom:12px}
.no-data-card p{color:#94a3b8;font-size:0.85rem;margin-bottom:10px;line-height:1.5}
.no-data-card a{color:#3b82f6;text-decoration:none}
.no-data-card a:hover{text-decoration:underline}
.no-data-card .info-row{display:flex;gap:8px;margin-top:8px;padding:8px 12px;background:#0f172a;border-radius:6px;font-size:0.8rem}
.no-data-card .info-row .lbl{color:#64748b;min-width:80px}
.csv-import-area{margin-top:16px;padding:16px;border:2px dashed #475569;border-radius:8px;text-align:center;cursor:pointer}
.csv-import-area:hover{border-color:#3b82f6;background:#3b82f610}
.csv-import-area input{display:none}
@media(max-width:768px){.sidebar{width:60px}.county-item .county-name{display:none}.county-item .county-badge{font-size:0.6rem;padding:1px 4px}.sidebar-header h2 span{display:none}.sidebar-total{display:none}}
</style>
